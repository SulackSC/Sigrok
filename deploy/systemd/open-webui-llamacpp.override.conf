[Service]
# Route OpenWebUI "OpenAI" provider to local llama.cpp server.
Environment="ENABLE_OPENAI_API=true"
Environment="OPENAI_API_BASE_URLS=http://127.0.0.1:8081/v1"
Environment="OPENAI_API_KEYS=sk-no-key-required"

# Optional: disable Ollama provider to force llama.cpp-only usage in OpenWebUI.
Environment="ENABLE_OLLAMA_API=false"
